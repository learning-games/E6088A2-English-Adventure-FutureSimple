<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>English Adventure Future Simple ป.5-6</title>
<style>

/* ===== ฟอนต์รวมหน้า ===== */
@font-face{
  font-family: 'MyGameFont';
  src: url('image/THSarabunNew.woff2') format('woff2'),
       url('image/THSarabunNew.woff') format('woff'),
       url('image/THSarabunNew.ttf') format('truetype');
  font-weight: 400; font-style: normal; font-display: swap;
}
@font-face{
  font-family: 'MyGameFont';
  src: url('image/THSarabunNewBold.woff2') format('woff2'),
       url('image/THSarabunNewBold.woff') format('woff'),
       url('image/THSarabunNewBold.ttf') format('truetype');
  font-weight: 700; font-style: normal; font-display: swap;
}
html, body, button, input, select, textarea, .pill, .btn, .btn-mini,
.levelBtn, #startTitle, #countdown, .label, #timer {
  font-family: 'MyGameFont', system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;
}

:root{
  --glass: rgba(0,0,0,.45);
  --ok: #10b981;
  --bad: #ef4444;
  --hud-top: 15px;
  --safe-top: env(safe-area-inset-top, 0px);

  /* ปรับความเร็วเอฟเฟกต์ fade ได้ที่นี่ */
  --fade-ms: 600ms;   /* เช่น 400ms / 800ms */
}

/* ===== Game Background Layer (สุ่มพื้นหลังเมื่อเข้าด่าน) ===== */
#gameBgLayer{
  position:fixed;
  inset:0;
  background-size:cover;
  background-position:center center;
  background-repeat:no-repeat;
  background-attachment:fixed;
  z-index:0;
  opacity:0;
  transition:opacity 0.5s ease;
  pointer-events:none;
}
#gameBgLayer.active{
  opacity:1;
}

*{ box-sizing:border-box }
html,body{ height:100%; margin:0 }
body{
  background: url("image/background2.png") center center / cover no-repeat fixed !important;
  overflow:hidden; color:#fff;
}
#game{ position:relative; width:100vw; height:100vh; overflow:hidden }

/* ===== HUD ===== */
.hud{
  position:fixed;
  inset: calc(var(--safe-top) + var(--hud-top)) 5px auto 38px !important;
  display:flex;
  align-items:center;
  gap:12px;
  justify-content:space-between;
  pointer-events:none;
  z-index:40000;
}

/* === ซ่อน/แสดง HUD และนาฬิกา === */
body:not(.in-game):not(.prestart) .hud { display: none !important; }
body:not(.in-game):not(.prestart) #clock { display: none !important; }

/* === ซ่อน muteBtn/fsBtn บนหน้า welcome/landing (ก่อนเลือกด่าน) === */
body:not(.in-game):not(.prestart) #muteBtn,
body:not(.in-game):not(.prestart) #fsBtn { display: none !important; }

/* ===== Game Clock (Top Center, uses existing timer) ===== */
#clock.clock-pill{
  position:fixed;
  top:14px;
  left:50%;
  transform:translateX(-50%);
  z-index:16000;
  pointer-events:none;

  --clock-size: clamp(30px, 2dvw, 999px);
  font-size: var(--clock-size);

  background: var(--glass);
  backdrop-filter: blur(6px);
  color:#fff;
  font-weight:1000;
  line-height:1;
  border-radius:999px;
  padding:8px 16px;
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  text-shadow:0 3px 10px rgba(0,0,0,.55);
}

.pill{ background:var(--glass); backdrop-filter:blur(6px); padding:8px 12px; border-radius:999px; box-shadow:0 4px 18px rgba(0,0,0,.25) }
#timer{ font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:.5px; font-size:20px }
.btn-mini{ pointer-events:auto; background:#1f2937; color:#fff; border:none; border-radius:12px; padding:8px 12px; font-weight:800; cursor:pointer; box-shadow:0 4px 18px rgba(0,0,0,.25) }
.btn-mini:hover{ filter:brightness(1.1) }

/* ===== Hover ปุ่มระบบ ===== */

.btn-mini,
#muteBtn,
#fsBtn{
  transition:
    transform .15s ease,
    filter .15s ease,
    box-shadow .15s ease;
}

.btn-mini:hover,
#muteBtn:hover,
#fsBtn:hover{
  transform:scale(1.08);

  filter:brightness(1.12);

  box-shadow:
    0 16px 38px rgba(0,0,0,.45),
    0 0 20px rgba(255,255,255,.18);
}

.score-label{ display:none !important; }


/* กล่องคะแนนเป็นตัวเลข ปรับขนาดด้วย --score-size */
.pill.gold{
    --score-size: clamp(20px, 2dvw, 999px);
  background: var(--glass);
  border-radius: 12px;
  padding: 6px 12px;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: calc(var(--score-size) * 1.6);
  box-shadow: 0 4px 18px rgba(0,0,0,.25);
}
.pill.gold .num{
  font-size: var(--score-size);
  font-weight: 1000;
  font-variant-numeric: tabular-nums;
  letter-spacing: .5px;
}

@media (max-width:480px){ .pill.gold{ --gold-size:24px; --gold-cols:8; --gold-rows:2 } }

/* ===== Welcome / Landing ===== */
#landing{ position:fixed; inset:0; display:flex; flex-direction:column; gap:22px; align-items:center; justify-content:center; background:url("image/background2.png") center/cover no-repeat fixed !important; z-index:20000; transition:opacity .3s ease }
#landing.hide{ opacity:0; pointer-events:none; visibility:hidden }
#landing .brand{ width:min(92vw,1100px) }
#landing .brand img{ width:100%; height:auto; display:block; filter:drop-shadow(0 10px 30px rgba(0,0,0,.6)) }
#welcome{
  position:fixed;
  inset:0;
  background:url("image/welcome.png") center/cover no-repeat fixed;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:24px;
  z-index:25000;
  transition:opacity .3s ease;
  overflow:hidden;
}

#welcome.hide{
  opacity:0;
  pointer-events:none;
  visibility:hidden;
}

#welcome .welcome-content{ 
  position:relative;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ===== Responsive Scale Group ===== */

#welcome .welcome-inner{
  position:relative;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  gap:clamp(10px,2dvh,24px);

  transform:scale(var(--welcome-scale,1));
  transform-origin:center center;

  will-change:transform;
}

#landing .landing-inner{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  gap:clamp(12px,2.4dvh,26px);

  transform:scale(var(--landing-scale,1));
  transform-origin:center center;

  will-change:transform;
}

#welcome .brand{
  width:min(90vw,1000px);
  margin-bottom:100px;
  display:flex;
  justify-content:center;
}

#welcome .brand img{
  width:min(150%, 1400px);
  max-width:150%;
  height:auto;
  max-height:75dvh;
  object-fit:contain;
  display:block;
  animation:pulse 3s infinite ease-in-out;
  filter:drop-shadow(0 6px 18px rgba(0,0,0,.45));
}

#welcome #enterBtn{
  position:absolute;
  left:50%;
  bottom:12dvh;

  transform:translateX(-50%);

  padding:12px 28px;
  font-size:clamp(22px,4vw,36px);
  font-weight:1000;
  letter-spacing:.2px;

  border:0;
  border-radius:16px;

  color:#fff;
  background:rgba(0,0,0,.55);

  box-shadow:0 10px 28px rgba(0,0,0,.35);

  cursor:pointer;

  backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.18);

  transition:
    transform .15s ease,
    filter .15s ease,
    box-shadow .15s ease;
}

#welcome #enterBtn:hover{
  transform:translateX(-50%) scale(1.08);

  filter:brightness(1.12);

  box-shadow:
    0 16px 38px rgba(0,0,0,.45),
    0 0 20px rgba(255,255,255,.18);
}

#welcome #enterBtn:active{
  transform:translateX(-50%) scale(0.95);

  filter:brightness(.95);
}



@keyframes pulse{ 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.04);opacity:.9} }
.level-menu{ display:flex; flex-direction:column; gap:14px; width:min(92vw,640px) }
.levelBtn{
width:87%;
max-width:580px;
min-width:280px;
margin:0 auto;

  padding:10px 16px;

  font-size:clamp(20px,4vw,34px);
  font-weight:1000;
  letter-spacing:.2px;

  border:0;
  border-radius:14px;

  color:#fff;
  background:rgba(0,0,0,.55);

  box-shadow:0 10px 28px rgba(0,0,0,.35);

  cursor:pointer;
  text-align:center;

  border:1px solid rgba(255,255,255,.18);

  backdrop-filter:blur(6px);

  transition:
    transform .15s ease,
    filter .15s ease,
    box-shadow .15s ease;
}

.levelBtn:hover{
  transform:scale(1.08);

  filter:brightness(1.12);

  box-shadow:
    0 16px 38px rgba(0,0,0,.45),
    0 0 20px rgba(255,255,255,.18);
}

#startScreen{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.9);
  z-index:30000;
  text-align:center;
  padding:24px;
}

#startBtn{
  margin-top:24px;
  padding:16px 46px;
  border:0;
  border-radius:18px;
  font-size:clamp(28px, 4dvw, 52px);
  font-weight:1000;
  cursor:pointer;
  background:linear-gradient(180deg, #fde047, #f59e0b);
  color:#fff;
  text-shadow:0 3px 8px rgba(0,0,0,.45);
  box-shadow:0 12px 30px rgba(0,0,0,.38);
  transition:transform .15s ease, filter .15s ease, box-shadow .15s ease;
}

#startBtn:hover{
  transform:scale(1.08);
  filter:brightness(1.08);
  box-shadow:0 16px 38px rgba(0,0,0,.48);
}

#startTitle{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  text-align:center;
}

/* หัวข้อ */
.missionTitle{
  font-size:clamp(32px,5.5dvw,64px);
  font-weight:1000;
}

.missionLine{
  font-size:clamp(22px,3.5dvw,36px);
  font-weight:800;
  opacity:1;
  text-align:left;

  width:auto;
  max-width:none;

  white-space:nowrap;
}

#countdown{ display:none; font-size:clamp(56px,12vw,120px); font-weight:1000; line-height:1; margin-top:8px }

/* ===== ภาพประกอบคำถาม ===== */
#qImg{
  position:absolute;
  top: 50%;
  left: 50%;
  max-width: min(60vw, 720px);
  max-height: min(48vh, 480px);
  width:auto; height:auto;
  display:none;
  z-index:9;
  filter: drop-shadow(0 10px 30px rgba(0,0,0,.45));
  border-radius: 12px;
  transform: translate(-50%, -50%)
             translate(var(--fxX, 0), var(--fxY, 0))
             scale(var(--fxS, 1));
  transition:
    transform 520ms cubic-bezier(.2,.9,.2,1),
    opacity 520ms;
}

/* ===== กล่องคำถาม ===== */
#questionBox{
  position: fixed;
  top: var(--qTop);
  left: 50%;
  transform: translate(-50%, 0)
             translate(var(--fxX, 0), var(--fxY, 0))
             scale(var(--fxS, 1));
  background:none; border:none; padding:0;
  font-size: clamp(32px, 11dvw, 110px);
  font-weight:1000; color:#fff;
  text-shadow:0 4px 12px rgba(0,0,0,.8);
  z-index: 10;
  white-space:pre; overflow:visible; text-align:center;
  transition: transform 520ms cubic-bezier(.2,.9,.2,1), opacity 520ms;
}

#questionBox.pre-drop{
  top: calc(var(--qTop) - 40px);
  opacity: 0;
}

/* ===== ตัวเลือกแบบวงกลม 2 ปุ่ม ===== */
.option.circle{
  position:absolute;
  width: var(--c-sz, clamp(120px, 18vw, 220px));
  height: var(--c-sz, clamp(120px, 18vw, 220px));
  border-radius:50%;
  border:10px solid transparent;
  background:
    radial-gradient(35% 35% at 30% 30%, rgba(255,255,255,.18), rgba(255,255,255,0) 60%) padding-box,
    var(--ring, linear-gradient(130deg,#999,#666)) border-box;
  box-shadow:0 8px 28px rgba(0,0,0,.35);
  display:grid; place-items:center;
  cursor:pointer; user-select:none; z-index:12;
  transition: top 800ms cubic-bezier(.2,.9,.2,1),
             left 800ms cubic-bezier(.2,.9,.2,1);
}
.option.circle .label{
  font-weight:1000;
  font-size:clamp(18px,2.2vw,32px);
  color:#fff;
  text-align:center;
  text-shadow:0 3px 10px rgba(0,0,0,.6);
  padding:0 10px; line-height:1.15
}
.option.circle.live {
  background: rgba(0,0,0,.55);
  border: 10px solid #d97706;
  box-shadow: 0 6px 18px rgba(0,0,0,.35);
}
.option.circle.non {
  background: rgba(0,0,0,.55);
  border: 10px solid #a855f7;
  box-shadow: 0 6px 18px rgba(0,0,0,.35);
}
.option.circle { --c-sz: clamp(140px, 20vw, 240px); }

.option.circle.in-anim {
  animation: zoomInBounce 650ms cubic-bezier(.25,.8,.25,1) forwards;
  transform: scale(0.3);
  opacity: 0;
}
@keyframes zoomInBounce {
  0%   { transform: scale(0.3); opacity: 0; }
  60%  { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(1);   opacity: 1; }
}
.option.circle .label {
    font-size: clamp(32px, 4vw, 60px);
  font-weight: 900;
  letter-spacing: .5px;
  color: #fff;
}
.option.circle.glow{
  filter: drop-shadow(0 0 10px rgba(250,204,21,.70)) drop-shadow(0 0 18px rgba(250,204,21,.55));
}

/* ===== เอฟเฟกต์/Toast/ภาพผลลัพธ์ ===== */
#flash{ position:fixed; inset:0; background:transparent; pointer-events:none; z-index:17000 }
.flash-clear{ animation: flashC 2000ms ease-out }
@keyframes flashC{ 0%{background:rgba(255,255,255,.55)} 100%{background:transparent} }

/* =========================
   ✅ Stage 3: Clash (Knight vs Monster)
   4 steps same speed (ปรับแยกทีหลังได้)
   ========================= */
:root{
  --stage3-step-ms: 700ms;        /* เวลาเคลื่อน/ค้าง (step1-3) */
  --stage3-fade-ms: 650ms;        /* เวลาเฟดของรูป */
  --stage3-emoji-hold-ms: 450ms;  /* เวลาให้อีโมจิค้างหลังรูปเริ่มเฟด */
  --stage3-emoji-fade-ms: 500ms;  /* เวลาเฟดของอีโมจิ */
  --clash-edge-pad: 8px;
}

.stage3-wrap{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:19000;
}

.stage3-img{
  position:fixed;
  top:60%;
  width: min(52dvw, 560px);
  height:auto;
  transform: translateY(-50%) translateX(0);
  opacity:1;
  filter: drop-shadow(0 16px 40px rgba(0,0,0,.55));
  will-change: transform, opacity;
}

.stage3-img.left{ left: var(--clash-edge-pad); }
.stage3-img.right{ right: var(--clash-edge-pad); }

/* ✅ Step 2: move to center (touch at exact screen center) */
.stage3-img.move{
  transition: transform var(--stage3-step-ms) linear;
}
.stage3-img.left.move{
  transform: translateY(-50%) translateX(var(--moveX, 0px));
}
.stage3-img.right.move{
  transform: translateY(-50%) translateX(calc(-1 * var(--moveX, 0px)));
}

/* ✅ Step 4: fade out */
.stage3-img.fade{
  transition: opacity var(--stage3-fade-ms) linear;
  opacity:0;
}


/* ✅ Result emoji (show during step 4) */
.stage3-result{
  position:fixed;
  left:50%;
  top:50%;
  transform: translate(-50%,-50%) scale(1);
  font-size: clamp(72px, 12vw, 160px);
  line-height:1;
  z-index:19500;
  opacity:0;
  filter: drop-shadow(0 12px 36px rgba(0,0,0,.55));
  transition: opacity var(--stage3-emoji-fade-ms) ease;
}
.stage3-result.show{ opacity:1; }
.stage3-result.fade{
  opacity:0;
}




#roundToast{
  position:fixed; left:50%; top:50%; transform:translate(-50%,-50%);
  background:rgba(0,0,0,.78); border:1px solid rgba(255,255,255,.22);
  padding:18px 26px; border-radius:16px; font-size:clamp(22px,3vw,34px); font-weight:900;
  z-index:17500; display:none; text-align:center; white-space:nowrap; line-height:1.25;
}
#roundToast .q{ display:block }
#roundToast .a{ display:block; margin-top:.15em; opacity:.95 }
#roundToast .r{ display:block; margin-top:.35em; font-weight:1000 }
#roundToast .r.ok{ color:var(--ok) }
#roundToast .r.bad{ color:var(--bad) }

#ansImg{
  position:fixed; inset:0; width:100vw; height:100vh; object-fit:cover; object-position:center;
  opacity:.95; filter: drop-shadow(0 20px 60px rgba(0,0,0,.50));
  z-index:17499; display:none; pointer-events:none;
}

/* ===== กล้อง/แคนวาส AR ===== */
#cameraMirror{ position:fixed; inset:0; width:100vw; height:100vh; object-fit:cover; transform: scaleX(-1); z-index:1; display:none; background:#000 }
#camCanvas{ position:fixed; inset:0; width:100vw; height:100vh; z-index:2; pointer-events:none; display:none }
#game{ z-index:3; position:relative }

/* ปุ่ม Mute / Fullscreen */
#muteBtn, #fsBtn{
  position: fixed;
  right: 12px;
  width: 44px;
  height: 44px;
  border-radius: 999px;
  background: rgba(0,0,0,.45);
  border: 1px solid rgba(255,255,255,.3);
  color: #fff;
  font-size: 18px;
  line-height: 1;
  display: grid;
  place-items: center;
  cursor: pointer;
  z-index: 50000;
}
#muteBtn{ bottom:12px }
#fsBtn{ bottom:62px }

/* มุมภาพประดับ */
body::after{ content:""; position:fixed; top:0; left:0; width:var(--corner-img-w, 220px); height:var(--corner-img-h, 220px); background:url("image/button1.png") no-repeat left top / contain; pointer-events:none; z-index:10000 }
body::before{ content:""; position:fixed; top:0; right:0; width:var(--corner2-img-w, 200px); height:var(--corner2-img-h, 200px); background:url("image/button2.png") no-repeat right top / contain; pointer-events:none; z-index:10000 }

/* ===== อีโมจิขนมลอยไปมุม ===== */
.fly-emoji{
  position:fixed;
  left:50vw;
  top:50vh;
  font-size:clamp(48px, 8vw, 96px);
  line-height:1;
  pointer-events:none;
  z-index:20000;
  opacity:0;
  transform:translate(0,0) scale(.9);
  filter: drop-shadow(0 6px 18px rgba(0,0,0,.35));
}
.fly-emoji.go{
  animation: emojiFly var(--emoji-ms, 1200ms) cubic-bezier(.2,.8,.2,1) forwards;
}
@keyframes emojiFly{
  0%   { opacity:0; transform:translate(0,0) scale(.9); }
  10%  { opacity:1; }
  100% { opacity:0; transform:translate(var(--dx, 0), var(--dy, -300px)) scale(1.1); }
}

/* ===== เอฟเฟกต์จางหายเรียบ ๆ ===== */
.option.circle.fade-out { animation: fadeOut var(--fade-ms, 600ms) ease forwards; }
@keyframes fadeOut { 0%{opacity:1; transform:scale(1)} 100%{opacity:0; transform:scale(.9)} }
/* ✅ [เพิ่ม] ให้ tap-target เฟดออกแบบเดียวกับวงกลมคำตอบ */
.tap-target.fade-out{
  animation: fadeOut var(--fade-ms, 600ms) ease forwards !important;
  /* ปิดแอนิเมชันเดิม (wiggle/glow) ด้วยการ override animation ด้านบน */
  pointer-events: none;
}


#timebarWrap{ display:none !important }

/* ===== Tap target สำหรับอีโมจิเก็บ (แบบเดิม) ===== */
.tap-target{
  position:absolute;
  font-size: clamp(30px, 12dvw, 180px);
  line-height: 1;
  user-select:none;
  cursor:pointer;
  z-index: 20050;
  filter: drop-shadow(0 8px 18px rgba(0,0,0,.35));
  transition: transform 120ms ease;
  animation:
    emojiFadeIn 520ms ease-out both,
    glowPulse 1.8s ease-in-out infinite 120ms,
    wiggle 1.4s ease-in-out infinite 120ms;
  will-change: opacity;
  text-shadow:
    0 0 10px rgba(255,255,255,.70),
    0 0 22px rgba(255,210,120,.55),
    0 0 36px rgba(255,140,0,.40);
}
.tap-target:active{ transform: scale(.92); }
.tap-target.disappear { animation: emojiFadeOut 400ms ease-in-out forwards !important; }

@keyframes emojiFadeIn { 0%{opacity:0} 45%{opacity:0} 100%{opacity:1} }
@keyframes emojiFadeOut{ 0%{opacity:1} 100%{opacity:0} }

/* wiggle */
@keyframes wiggle {
  0%, 100% { transform: rotate(0deg); }
  15% { transform: rotate(-6deg); }
  30% { transform: rotate(6deg); }
  45% { transform: rotate(-4deg); }
  60% { transform: rotate(4deg); }
  75% { transform: rotate(-2deg); }
  90% { transform: rotate(2deg); }
}

/* ตำแหน่งอิสระของข้อความ/รูป */
:root{
  --qTop: 8vh;
  --qLeft: 50%;
}

<script>
(function(){
  const muteBtn = document.getElementById('muteBtn');
  const bgm     = document.getElementById('bgm');
  if(!muteBtn || !bgm) return;

  let bgmMuted = false;

  function applyBgmMute(m){
    bgmMuted = !!m;
    bgm.muted = bgmMuted;
    muteBtn.setAttribute('aria-pressed', String(bgmMuted));
    muteBtn.textContent = bgmMuted ? '🔇' : '🔊';
  }

  muteBtn.addEventListener('click', () => applyBgmMute(!bgmMuted));
})();
</script>

<!-- ===== ควบคุม Fullscreen ===== -->
<script>
(function(){
  const fsBtn = document.getElementById('fsBtn');
  if (!fsBtn) return;
  function fsEnabled(){ return document.fullscreenEnabled || document.webkitFullscreenEnabled || document.msFullscreenEnabled }
  function isFull(){ return document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement }
  function requestFS(){ const el=document.documentElement; (el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen)?.call(el) }
  function exitFS(){ (document.exitFullscreen||document.webkitExitFullscreen||document.msExitFullscreen)?.call(document) }
  function render(){ const on=!!isFull(); fsBtn.setAttribute('aria-pressed', String(on)); fsBtn.title = on ? 'ออกจากโหมดเต็มจอ' : 'เข้าสู่โหมดเต็มจอ'; fsBtn.textContent = on ? '🗗' : '⛶' }
  if (!fsEnabled()){ fsBtn.style.display='none'; return }
  fsBtn.addEventListener('click', () => { if(isFull()) exitFS(); else requestFS() });
  document.addEventListener('fullscreenchange', render);
  document.addEventListener('webkitfullscreenchange', render);
  document.addEventListener('msfullscreenchange', render);
  render();
})();
</script>

// ===== Web Audio Pool (แก้เสียงหน่วง) =====
const _audioCtx = (() => {
  try { return new (window.AudioContext || window.webkitAudioContext)(); }
  catch(e) { return null; }
})();

const _audioBufferCache = new Map(); // url → AudioBuffer

async function _decodeAudioUrl(url) {
  if (!_audioCtx) return null;
  if (_audioBufferCache.has(url)) return _audioBufferCache.get(url);
  try {
    const res = await fetch(url);
    const arr = await res.arrayBuffer();
    const buf = await _audioCtx.decodeAudioData(arr);
    _audioBufferCache.set(url, buf);
    return buf;
  } catch(e) {
    return null;
  }
}

function _playBuffer(buf, vol = 1) {
  if (!_audioCtx || !buf) return;
  try {
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
    const src = _audioCtx.createBufferSource();
    const gain = _audioCtx.createGain();
    src.buffer = buf;
    gain.gain.value = Math.max(0, Math.min(1, vol));
    src.connect(gain);
    gain.connect(_audioCtx.destination);
    src.start(0);
  } catch(e) {}
}

// map จาก <audio> element → url (ใช้คู่กับ playSfx เดิม)
function _getAudioSrc(el) {
  return el?.src || el?.currentSrc || el?.getAttribute?.('src') || null;
}
// ===== End Audio Pool =====

function playSfx(el, vol) {
  if (!el) return;
  const url = _getAudioSrc(el);
  const volume = (typeof vol === 'number')
    ? Math.max(0, Math.min(1, vol))
    : (el.volume ?? 1);

  // ถ้า buffer พร้อมแล้ว เล่นทันทีจาก Web Audio
  if (_audioCtx && url && _audioBufferCache.has(url)) {
    _playBuffer(_audioBufferCache.get(url), volume);
    return;
  }

  // fallback: cloneNode เดิม (กรณี AudioContext ไม่รองรับ)
  try {
    const n = el.cloneNode(true);
    n.volume = volume;
    n.muted = false;
    n.play?.();
  } catch(_) {}
}

function warmImage(url){
  if (!url) return Promise.resolve(null);

  const cached = __preloadImageCache.get(url);
  if (cached && cached.complete && cached.naturalWidth > 0) {
    return Promise.resolve(cached);
  }

  return new Promise((resolve, reject)=>{
    const img = new Image();
    img.decoding = 'async';
    img.loading = 'eager';

    img.onload = async ()=>{
      try{ await img.decode(); }catch(_){}
      __preloadImageCache.set(url, img);
      resolve(img);
    };

    img.onerror = ()=> reject(new Error('โหลดรูปไม่ได้: ' + url));
    img.src = url;
  });
}

function warmAudio(url) {
  if (!url) return Promise.resolve(null);

  const cached = __preloadAudioCache.get(url);
  if (cached) {
    // ถ้า Web Audio พร้อม ให้ decode buffer ด้วย (ถ้ายังไม่มี)
    if (_audioCtx && !_audioBufferCache.has(url)) {
      _decodeAudioUrl(url).catch(() => {});
    }
    return Promise.resolve(cached);
  }

  return new Promise((resolve, reject) => {
    const au = new Audio();
    au.preload = 'auto';
    au.src = url;

    let done = false;
    const finish = () => {
      if (done) return;
      done = true;
      cleanup();
      __preloadAudioCache.set(url, au);
      // decode เป็น AudioBuffer ทันทีหลัง canplay
      if (_audioCtx && !_audioBufferCache.has(url)) {
        _decodeAudioUrl(url).catch(() => {});
      }
      resolve(au);
    };
    const fail = () => {
      if (done) return;
      done = true;
      cleanup();
      reject(new Error('โหลดเสียงไม่ได้: ' + url));
    };
    const cleanup = () => {
      au.removeEventListener('canplaythrough', finish);
      au.removeEventListener('canplay', finish);
      au.removeEventListener('loadeddata', finish);
      au.removeEventListener('error', fail);
    };

    au.addEventListener('canplaythrough', finish, { once: true });
    au.addEventListener('canplay', finish, { once: true });
    au.addEventListener('loadeddata', finish, { once: true });
    au.addEventListener('error', fail, { once: true });

    au.load();
    setTimeout(finish, 3500);
  });
}

    ...assets.images
      .filter(url => !__preloadImageCache.has(url))
      .map(url => ({ type:'image', url })),

    ...assets.audio
      .filter(url => !__preloadAudioCache.has(url))
      .map(url => ({ type:'audio', url }))
  ];

  let done = 0;
  const total = jobs.length;

  if (!opts.silent) updateLevelPreloadUI(done, total);

      hideLevelPreloadUI();

      else await warmAudio(job.url);

    done++;

  __levelPreloadReady.set(lv, true);

  if (!opts.silent) {
    updateLevelPreloadUI(total, total);
    await new Promise(r => setTimeout(r, 250));
    hideLevelPreloadUI();
  }

  return true;
}

  function makeWrongNear(correct, span=6){
    for(let t=0;t<40;t++){
      const w = correct + rand(-span, span);
      if (w !== correct && w >= 0) return w;
    }
    return correct + 1;
  }

function makeWrongNearBounded(correct, span=2, minV=0, maxV=20){
  for(let t=0; t<80; t++){
    const w = correct + rand(-span, span);
    if (w !== correct && w >= minV && w <= maxV) return w;
  }
  // fallback
  const fallback = Math.min(maxV, Math.max(minV, correct + 1));
  return (fallback === correct) ? Math.max(minV, correct - 1) : fallback;
}


  function makeMathQuestion(level){
  const maxAns = MAX_ANSWER_BY_LEVEL[level] ?? 20;
  const ab = MAX_AB_BY_LEVEL[level] ?? { a: 20, b: 20 };
  const maxA = ab.a ?? 20;
  const maxB = ab.b ?? 20;

// ===== ด่าน 1: บวก (+)
// เงื่อนไข: a <= 20, b <= 20, และ a+b <= 20
if (level === 1){
  let a, b, ans;

  // สุ่ม a,b เต็มเพดานก่อน แล้วคัดให้ผ่านเงื่อนไขคำตอบไม่เกิน 20
  // (แก้ปัญหา b ถูกบีบให้เล็กเมื่อ a ใหญ่)
  for(let t=0; t<200; t++){
    a = rand(1, maxA);
    b = rand(1, maxB);
    ans = a + b;
    if (ans <= maxAns) break;
  }

  // ✅ ช้อยส์ผิดให้ “ใกล้” คำตอบขึ้น เพื่อลดการเดาง่าย
  const wrong = makeWrongNearBounded(ans, 2, 0, maxAns); // ±2 พอ
  const choices = shuffle([ans, wrong]);
return {
  mode: 2,
  question: `${a} + ${b}`,
  img: null,
  choices,
  correctIndex: choices.indexOf(ans)
};

}


  // ===== ด่าน 2: ลบ (−)
  // เงื่อนไข: a <= 20, b <= 20, และ "ไม่ติดลบ" (สลับให้ a>=b)
  if (level === 2){
    let a = rand(1, maxA);
    let b = rand(1, maxB);

    // คุมไม่ให้ติดลบ (ยังคงเงื่อนไขเดิมที่เกมควรอ่านง่าย)
    if (b > a){ const t=a; a=b; b=t; }

    const ans = a - b; // จะอยู่ในช่วง 0..20 แน่นอน

    const wrong = makeWrongNear(ans, 6);
    const choices = shuffle([ans, wrong]);
return {
  mode: 2,
  question: `${a} − ${b}`,
  img: null,
  choices,
  correctIndex: choices.indexOf(ans)
};

  }

  // ===== ด่าน 3: คูณ (×)
  // เงื่อนไข: a <= 12, b <= 12, และ a*b <= 144
  if (level === 3){
    const a = rand(0, maxA); // 0..12
    const b = rand(0, maxB); // 0..12
    const ans = a * b;       // สูงสุด 144 (12*12)

    const wrong = makeWrongNear(ans, 8);
    const choices = shuffle([ans, wrong]);
return {
  mode: 2,
  question: `${a} × ${b}`,
  img: null,
  choices,
  correctIndex: choices.indexOf(ans)
};
  }

  // fallback เผื่อกรณี level แปลก
  const a = rand(0, 10), b = rand(0, 10);
  const ans = a + b;
  const wrong = makeWrongNear(ans, 6);
  const choices = shuffle([ans, wrong]);
  return { mode: 2, question: `${a} + ${b} = ?`, img: null, choices, correctIndex: choices.indexOf(ans) };
}

  const SAFE_EMOJIS = ['🪄','🛡️','⚔️','🗡️','🪃','🏹','🪙','🔫','🪵','🪠','🛡️','⚔️','🗡️','🏹','🛡️'];

function placeTapTarget(el){
  const PADDING = 18;
  const triesMax = 160;

  // ✅ ระยะห่างขั้นต่ำระหว่างอีโมจิ
  const MIN_GAP = Math.max(36, innerWidth * 0.045);

  // ✅ แบ่งจอเป็น 3 ส่วนแนวนอน แล้วห้ามเกิดส่วนกลาง
  const thirdW = innerWidth / 3;
  const forbiddenRect = {
    x: thirdW,
    y: 0,
    w: thirdW,
    h: innerHeight
  };

  const rectsOverlap = (ax,ay,aw,ah, bx,by,bw,bh) =>
    (ax < bx + bw) && (ax + aw > bx) && (ay < by + bh) && (ay + ah > by);

  function getExistingRects(exceptEl){
    const nodes = [...document.querySelectorAll('.tap-target')].filter(n => n !== exceptEl);
    return nodes.map(n=>{
      const r = n.getBoundingClientRect();
      return { x:r.left, y:r.top, w:r.width, h:r.height };
    });
  }

  el.style.left = '-9999px';
  el.style.top  = '-9999px';
  document.body.appendChild(el);

  const r = el.getBoundingClientRect();
  const w = r.width;
  const h = r.height;

  const zones = [
    { minX: PADDING, maxX: Math.max(PADDING, thirdW - PADDING - w) },
    { minX: thirdW * 2 + PADDING, maxX: Math.max(thirdW * 2 + PADDING, innerWidth - PADDING - w) }
  ];

  const minY = PADDING;
  const maxY = Math.max(PADDING, innerHeight - PADDING - h);

  let x = 0, y = 0, ok = false, tries = 0;

  while (tries++ < triesMax){
    const zone = zones[(Math.random() * zones.length) | 0];

    x = Math.round(zone.minX + Math.random() * Math.max(0, zone.maxX - zone.minX));
    y = Math.round(minY + Math.random() * Math.max(0, maxY - minY));

    let good = !rectsOverlap(x,y,w,h, forbiddenRect.x, forbiddenRect.y, forbiddenRect.w, forbiddenRect.h);

    if (good){
      const existing = getExistingRects(el);

      for (const e of existing){
        const ex = e.x - MIN_GAP;
        const ey = e.y - MIN_GAP;
        const ew = e.w + MIN_GAP * 2;
        const eh = e.h + MIN_GAP * 2;

        if (rectsOverlap(x,y,w,h, ex,ey,ew,eh)){
          good = false;
          break;
        }
      }
    }

    if (good){
      ok = true;
      break;
    }
  }

  // fallback: ถ้าสุ่มไม่สำเร็จ ให้วางซ้าย/ขวาแบบไม่เข้ากลาง
  if (!ok){
    const zone = zones[(Math.random() * zones.length) | 0];
    x = Math.round(zone.minX + Math.random() * Math.max(0, zone.maxX - zone.minX));
    y = Math.round(minY + Math.random() * Math.max(0, maxY - minY));
  }

  el.style.left = x + 'px';
  el.style.top  = y + 'px';
}

function layoutSentenceChoices(){
  const btns = [...document.querySelectorAll('.option.sentence-choice')];
  if (btns.length !== 4) return;

  const vw = innerWidth;
  const vh = innerHeight;

  const qRect = qBox.getBoundingClientRect();
  const qBottom = Number.isFinite(qRect.bottom) ? qRect.bottom : 0;

  const minTopFromQuestion = qBottom + Math.max(28, vh * 0.035);
  let topY = Math.max(Math.round(vh * 0.31), Math.round(minTopFromQuestion));
  topY = Math.min(topY, Math.round(vh * 0.58));

  const edgePad = 6;

  const presets = [
    { font:'clamp(24px, 3.0dvw, 50px)', h:'clamp(100px, 13vh, 160px)', py:'12px', px:'18px', max:'22vw' },
    { font:'clamp(22px, 2.6dvw, 44px)', h:'clamp(92px, 12vh, 145px)', py:'10px', px:'14px', max:'21vw' },
    { font:'clamp(20px, 2.3dvw, 38px)', h:'clamp(84px, 11vh, 130px)', py:'8px', px:'12px', max:'20vw' },
    { font:'clamp(18px, 2.0dvw, 34px)', h:'clamp(78px, 10vh, 118px)', py:'7px', px:'10px', max:'19vw' }
  ];

  let chosenPreset = presets[presets.length - 1];

  // ✅ รอบเลือก preset: write รวม → read รวม ทีละ preset
  for (const p of presets){
    btns.forEach(btn=>{
      btn.style.setProperty('--choice-font', p.font);
      btn.style.setProperty('--choice-min-h', p.h);
      btn.style.setProperty('--choice-pad-y', p.py);
      btn.style.setProperty('--choice-pad-x', p.px);
      btn.style.setProperty('--choice-max-w', p.max);
    });

    const widths = btns.map(btn => btn.getBoundingClientRect().width);
    const totalW = widths.reduce((sum, w)=> sum + w, 0);
    const gap = (vw - totalW) / 5;

    chosenPreset = p;

    if (gap >= edgePad) break;
  }

  // ✅ ยืนยัน preset สุดท้าย
  btns.forEach(btn=>{
    btn.style.setProperty('--choice-font', chosenPreset.font);
    btn.style.setProperty('--choice-min-h', chosenPreset.h);
    btn.style.setProperty('--choice-pad-y', chosenPreset.py);
    btn.style.setProperty('--choice-pad-x', chosenPreset.px);
    btn.style.setProperty('--choice-max-w', chosenPreset.max);
  });

  // ✅ Shrink label font-size ถ้าข้อความยาวเกินกล่อง (ไม่ตัดบรรทัด)
  btns.forEach(btn=>{
    const label = btn.querySelector('.label');
    if (!label) return;
    label.style.fontSize = '';
    const maxW = btn.getBoundingClientRect().width - (parseFloat(chosenPreset.px) || 12) * 2;
    if (label.scrollWidth > maxW && maxW > 0){
      let fs = parseFloat(getComputedStyle(label).fontSize);
      while (label.scrollWidth > maxW && fs > 10){
        fs -= 1;
        label.style.fontSize = fs + 'px';
      }
    }
  });

  // ✅ read phase รอบเดียว
  requestAnimationFrame(()=>{
    let widths = btns.map(btn => btn.getBoundingClientRect().width);
    let totalW = widths.reduce((sum, w)=> sum + w, 0);
    let gap = (vw - totalW) / 5;

    // ถ้า gap ติดลบ (ปุ่มรวมกันเกินจอ) ให้บีบ max-width ให้พอดี
    if (gap < edgePad){
      const maxBtnW = Math.floor((vw - edgePad * 5) / 4);
      btns.forEach(btn => { btn.style.maxWidth = maxBtnW + 'px'; });
      widths = btns.map(btn => btn.getBoundingClientRect().width);
      totalW = widths.reduce((sum, w)=> sum + w, 0);
      gap = Math.max(edgePad, (vw - totalW) / 5);
    }

    let x = gap;

    // ✅ write phase รอบเดียว
    btns.forEach((btn, i)=>{
      btn.style.left = Math.round(x) + 'px';
      btn.style.top = topY + 'px';
      x += widths[i] + gap;
    });
  });
}

<!-- ===== Pose (มือเป็นวงกลมแตะเลือกช้อยส์ + แตะอีโมจิ tap-target ได้เหมือนเดิม) ===== -->
<script type="module">
import {PoseLandmarker, FilesetResolver} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
const camBtn = document.getElementById('camBtn');
const video  = document.getElementById('cameraMirror');
const cvs    = document.getElementById('camCanvas');
const ctx    = cvs.getContext('2d', { alpha: true });
const DETECT_W = 320;
let detectCanvas = document.createElement('canvas');
let detectCtx = detectCanvas.getContext('2d', { alpha:false, desynchronized:true });
let CAM_ON=false, landmarker=null, raf=0, stream=null;

function fitCanvas(){ const dpr = CAM_ON? 1 : Math.max(1, window.devicePixelRatio||1); cvs.width=Math.round(innerWidth*dpr); cvs.height=Math.round(innerHeight*dpr); cvs.style.width=innerWidth+'px'; cvs.style.height=innerHeight+'px'; ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr) }
fitCanvas(); addEventListener('resize', fitCanvas);
function coverCropRect(){ const vw=video.videoWidth||640, vh=video.videoHeight||480; const sw=innerWidth, sh=innerHeight; const scale=Math.max(sw/vw, sh/vh); const sW=Math.round(sw/scale), sH=Math.round(sh/scale); const sX=Math.round((vw-sW)/2), sY=Math.round((vh-sH)/2); return {sX,sY,sW,sH,vw,vh,sw,sh} }
function mapToScreen(nx,ny){ const {sX,sY,sW,sH,vw,vh,sw,sh} = coverCropRect(); const px=nx*vw, py=ny*vh; const u=(px-sX)/sW, v=(py-sY)/sH; let x=u*sw, y=v*sh; x=sw-x; return {x,y} }

const SHOW_HAND_BALL=false;
const lastHitAt=new WeakMap();
const HIT_LOCK_MS=160;
function circleIntersectsRect(cx,cy,r, rc){
  const nx=Math.max(rc.left, Math.min(cx, rc.right));
  const ny=Math.max(rc.top,  Math.min(cy, rc.bottom));
  const dx=cx-nx, dy=cy-ny;
  return (dx*dx+dy*dy)<=r*r
}

function hitByCircle(center, r){
  if (window.ended) return;
  const opts = [...document.querySelectorAll('.option, .tap-target')];
  for (const n of opts){
    const rc = n.getBoundingClientRect();
    if (circleIntersectsRect(center.x, center.y, r, rc)){
      const t = performance.now();
      const last = lastHitAt.get(n) || 0;
      if (t - last < HIT_LOCK_MS) continue;
      lastHitAt.set(n, t);
      n.click();
    }
  }
}

async function ensureLandmarker(){
  if(landmarker) return landmarker;
  const fileset = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
  landmarker = await PoseLandmarker.createFromOptions(fileset, {
    baseOptions:{ modelAssetPath:"https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task" },
    runningMode:'VIDEO', numPoses:1, minPoseDetectionConfidence:.35, minPosePresenceConfidence:.35, minTrackingConfidence:.35
  });
  return landmarker
}
function drawHandBall(elbowIdx, wristIdx, lm){
  if(!lm[elbowIdx]||!lm[wristIdx]) return null;
  const elbow = mapToScreen(lm[elbowIdx].x, lm[elbowIdx].y);
  const wrist = mapToScreen(lm[wristIdx].x, lm[wristIdx].y);
  const r=24;
  const L=Math.max(1, Math.hypot(wrist.x-elbow.x, wrist.y-elbow.y));
  const ux=(wrist.x-elbow.x)/L, uy=(wrist.y-elbow.y)/L;
  const HAND_PUSH=1.5, PUSH_PX=6;
  const center={ x: wrist.x + ux*(r*HAND_PUSH+PUSH_PX), y: wrist.y + uy*(r*HAND_PUSH+PUSH_PX) };
  if(SHOW_HAND_BALL){
    ctx.beginPath(); ctx.arc(center.x,center.y,r,0,Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill();
    ctx.lineWidth=3; ctx.strokeStyle='#fff'; ctx.stroke();
  }
  hitByCircle(center, r*.95);
  return center
}
function drawPoseAndColliders(res){
  const sw=innerWidth, sh=innerHeight;
  ctx.clearRect(0,0,sw,sh);
  if(!res?.landmarks?.length) return;
  const lm=res.landmarks[0];
  drawHandBall(13,15,lm);
  drawHandBall(14,16,lm)
}
function runLoop(){
  const step=()=>{
    if(!video.videoWidth){ raf=requestAnimationFrame(step); return }
    const now=performance.now();
    try{
      const {sX,sY,sW,sH}=coverCropRect();
      detectCtx.drawImage(video, sX,sY,sW,sH, 0,0, detectCanvas.width, detectCanvas.height);
      const res=landmarker.detectForVideo(detectCanvas, now);
      drawPoseAndColliders(res)
    }catch(e){}
    raf=requestAnimationFrame(step)
  };
  raf=requestAnimationFrame(step)
}
async function startCamera(){
  await ensureLandmarker();
  stream = await navigator.mediaDevices.getUserMedia({
    video: { width: 960, height: 540, frameRate: 30, facingMode: 'user' },
    audio: false
  });
  video.srcObject=stream;
  await video.play().catch(()=>{});
  const vw=video.videoWidth||640, vh=video.videoHeight||480;
  const ratio=vw/vh;
  detectCanvas.width=DETECT_W;
  detectCanvas.height=Math.round(DETECT_W/ratio);
  video.style.display='block';
  cvs.style.display='block';
  camBtn.textContent='📷 กล้อง: เปิด';
  CAM_ON=true; fitCanvas(); runLoop()
}
function stopCamera(){
  cancelAnimationFrame(raf);
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null }
  try{ video.pause() }catch(e){}
  video.removeAttribute('srcObject');
  video.style.display='none';
  cvs.style.display='none';
  ctx.clearRect(0,0,innerWidth,innerHeight);
  camBtn.textContent='📷 กล้อง: ปิด';
  CAM_ON=false; fitCanvas()
}
camBtn.addEventListener('click', async ()=>{
  if(!stream){
    try{ await startCamera() }
    catch(err){ camBtn.textContent='📷 กล้อง: ไม่ได้รับอนุญาต'; camBtn.disabled=true }
  } else { stopCamera() }
});
document.addEventListener('visibilitychange', ()=>{ if(document.hidden && stream) stopCamera() });
</script>
